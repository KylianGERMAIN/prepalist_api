# Déploiement prod PrepaList sur un serveur (VPS).
# Postgres = MANAGÉ EXTERNE (Neon/Supabase/RDS) — non inclus ici.
# Images construites + poussées par la CI sur tag (ghcr.io).
#
# Prérequis sur le serveur, dans ce dossier :
#   - .env       (niveau compose : DOMAIN, TAG)         — cf. .env.example
#   - .env.prod  (config de l'API : DB_*, JWT_*, ...)   — cf. .env.prod.example
#   - Caddyfile  (fourni)
#
# Le back (api) n'est PAS exposé publiquement : seul le front passe par Caddy.
# Le navigateur ne tape jamais l'API en direct (cookies httpOnly + route handlers du front).

services:
  api:
    image: ghcr.io/kyliangermain/prepalist-api:${TAG:-latest}
    env_file: .env.prod
    restart: unless-stopped
    expose:
      - "3000"

  front:
    image: ghcr.io/kyliangermain/prepalist-front:${TAG:-latest}
    environment:
      NODE_ENV: production
      # L'API est jointe via le réseau interne docker, pas par le domaine public.
      API_URL: http://api:3000
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - front

volumes:
  caddy_data:
  caddy_config:
